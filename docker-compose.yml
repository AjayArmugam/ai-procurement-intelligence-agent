services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: procurement-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./chroma_db:/app/chroma_db

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: procurement-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped